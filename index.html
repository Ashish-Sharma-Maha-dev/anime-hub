<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(270deg,#000,#1a0033,#000814,#140000,#1a1a1a);
background-size:500% 500%;
animation:bg 15s ease infinite;
color:#fff;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* MENU */
.menu-btn{position:fixed;top:20px;left:20px;z-index:1000;cursor:pointer}
.menu-btn div{width:30px;height:3px;background:red;margin:6px 0}

.menu{position:fixed;left:-300px;top:0;width:300px;height:100%;background:#000;padding-top:60px;transition:0.4s}
.menu a{display:block;padding:15px;color:#fff;text-decoration:none;border-bottom:1px solid #222}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{
font-size:50px;
background:linear-gradient(90deg,#ff0000,#a855f7,#00b4ff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* NAV */
.nav button{
padding:10px 15px;
background:linear-gradient(45deg,#ff0000,#a855f7);
border:none;color:#fff;margin:5px;border-radius:8px;cursor:pointer
}

/* SECTION */
.section{padding:80px 20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
transition:0.3s
}
.card:hover{transform:scale(1.05);box-shadow:0 0 30px red}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:15px}

button{padding:8px;background:red;border:none;color:#fff;cursor:pointer}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000d;justify-content:center;align-items:center}
.modal-content{background:#111;padding:20px;max-width:90%}
.modal img{width:100%;max-height:300px}

/* SCROLL */
.fade{opacity:0;transform:translateY(50px);transition:1s}
.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Pokémon</a>
<a href="#">Dragons</a>
<a href="#">Blogs</a>
<a href="#">Affiliate Shop</a>
<a href="#">Contact</a>
</div>

<!-- HERO -->
<section class="hero">
<h1>KINGU VAULT</h1>
<p>Ultimate Anime Platform</p>

<div class="nav">
<button onclick="show('anime')">Anime</button>
<button onclick="show('pokemon')">Pokémon</button>
<button onclick="show('dragons')">Dragons</button>
<button onclick="show('blogs')">Blogs</button>
</div>
</section>

<!-- ANIME -->
<section id="anime" class="section fade">
<h2>Top Anime</h2>
<div class="grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div class="card-content">
<h3>Jujutsu Kaisen</h3>
<button onclick="openModal('jjk')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<div class="card-content">
<h3>Attack on Titan</h3>
<button onclick="openModal('aot')">Explore</button>
</div>
</div>

</div>
</section>

<!-- SHOP -->
<section class="section fade">
<h2>Anime Shop</h2>
<div class="grid">

<div class="card">
<img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SL1500_.jpg">
<div class="card-content">
<h3>Naruto Hoodie</h3>
<button>Buy</button>
</div>
</div>

</div>
</section>

<!-- BLOG -->
<section id="blogs" class="section fade">
<h2>Blogs</h2>

<div class="card">
<div class="card-content">
<h3>Top Anime 2026</h3>
<p>Write your blog here...</p>
</div>
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="img">
<p id="text"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

function toggleMenu(){
let m=document.getElementById("menu");
m.style.left=m.style.left==="0px"?"-300px":"0px";
}

function show(id){
["anime","pokemon","dragons","blogs"].forEach(x=>{
let el=document.getElementById(x);
if(el) el.style.display="none";
});
let target=document.getElementById(id);
if(target) target.style.display="block";
}

const data={
jjk:{img:"https://cdn.myanimelist.net/images/anime/1141/142503.jpg",text:"Culling Game arc.",sound:"https://www.myinstants.com/media/sounds/jjk.mp3"},
aot:{img:"https://cdn.myanimelist.net/images/anime/1337/99013.jpg",text:"Final war.",sound:"https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3"}
};

let audio;

function openModal(name){
let d=data[name];
document.getElementById("modal").style.display="flex";
document.getElementById("img").src=d.img;
document.getElementById("text").innerText=d.text;

if(audio) audio.pause();
audio=new Audio(d.sound);
audio.play();
}

function closeModal(){
document.getElementById("modal").style.display="none";
if(audio) audio.pause();
}

/* SCROLL */
const observer=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

</script>

</body>
</html>
