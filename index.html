<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Hub India | Ashu Bhai</title>
    <style>
        :root { --primary: #e50914; --dark: #141414; --text: #ffffff; }
        body { font-family: sans-serif; background-color: var(--dark); color: var(--text); margin: 0; text-align: center; }
        header { padding: 40px 20px; background: #000; border-bottom: 4px solid var(--primary); }
        .container { padding: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .card { background: #222; width: 90%; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .card img { width: 100%; height: auto; }
        .card-content { padding: 15px; }
        .btn { background: var(--primary); color: white; padding: 12px; text-decoration: none; border-radius: 5px; display: block; margin-top: 10px; }
        h1 { color: var(--primary); margin: 0; }
    </style>
</head>

    <header>

                <h3>Black Clover News</h3>
                <a href="#" class="btn">Read More</a>
            </div>
        </div>
        <div class="card">
            <img src="https://m.media-amazon.com/images/M/MV5BNGYyZGM5MGMtY2RkMy00ZDRjLWEyNjUtYWU1MzRiYTc0ZDA2XkEyXkFqcGdeQXVyMzgxODM4NjM@._V1_FMjpg_UX1000_.jpg">

</html>
