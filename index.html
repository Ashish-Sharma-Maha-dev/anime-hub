<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }

body {
  background:#020202;
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header {
  height:100vh;
  background: radial-gradient(circle, rgba(120,0,0,0.4), #020202);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
}

/* HAMBURGER */
.menu-btn {
  position:fixed;
  top:20px;
  right:20px;
  cursor:pointer;
  z-index:1000;
}
.menu-btn div {
  width:30px;
  height:4px;
  background:red;
  margin:5px 0;
}

/* SIDE MENU */
.side-menu {
  position:fixed;
  right:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
  z-index:999;
}
.side-menu a {
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid red;
}
.side-menu a:hover {
  background:red;
}

/* DRAGON SECTION */
.section {
  padding:60px 20px;
}

.card {
  background:#111;
  margin:20px 0;
  padding:20px;
  border-left:5px solid red;
}

.bar {
  background:#333;
  height:10px;
  margin:10px 0;
}
.fill {
  height:100%;
  background:red;
}

button {
  padding:10px 20px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  border:3px solid red;
  max-width:90%;
  text-align:center;
}

.modal img {
  width:100%;
  max-height:250px;
  object-fit:cover;
}

/* GOKU */
#goku {
  position:fixed;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  opacity:0;
  z-index:999;
  filter: drop-shadow(0 0 20px yellow);
}

/* CANVAS */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<img id="goku" src="https://pngimg.com/uploads/goku/goku_PNG17.png">

<div class="menu-btn" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<div class="side-menu" id="menu">
  <a href="#">Home</a>
  <a href="#">New Shop</a>
  <a href="#">Dragon Wiki</a>
  <a href="#">Latest Blogs</a>
  <a href="#">Contact Dev</a>
</div>

<header>KINGU VAULT</header>

<div class="section">

  <!-- DRAGONS -->
  <div class="card">
    <h2>Tiamat</h2>
    <div class="bar"><div class="fill" style="width:90%"></div></div>
    <button onclick="summonDragon('tiamat')">Summon</button>
  </div>

  <div class="card">
    <h2>Kingu</h2>
    <div class="bar"><div class="fill" style="width:95%"></div></div>
    <button onclick="summonDragon('kingu')">Summon</button>
  </div>

  <div class="card">
    <h2>Typhon</h2>
    <div class="bar"><div class="fill" style="width:92%"></div></div>
    <button onclick="summonDragon('typhon')">Summon</button>
  </div>

  <div class="card">
    <h2>Bahamut</h2>
    <div class="bar"><div class="fill" style="width:97%"></div></div>
    <button onclick="summonDragon('bahamut')">Summon</button>
  </div>

  <div class="card">
    <h2>Shenron</h2>
    <div class="bar"><div class="fill" style="width:100%"></div></div>
    <button onclick="summonDragon('shenron')">Summon</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <img id="dragonImg">
    <p id="dragonText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* MENU */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.right = menu.style.right === "0px" ? "-250px" : "0px";
}

/* DRAGONS DATA */
const dragons = {
  tiamat:{
    img:"https://wallpaperaccess.com/full/39624.jpg",
    text:"Ancient chaos dragon of Mesopotamian mythology.",
    color:"blue"
  },
  kingu:{
    img:"https://wallpaperaccess.com/full/317501.jpg",
    text:"Commander of chaos army and bearer of destiny tablets.",
    color:"purple"
  },
  typhon:{
    img:"https://wallpaperaccess.com/full/214110.jpg",
    text:"Greek monster stronger than gods themselves.",
    color:"red"
  },
  bahamut:{
    img:"https://wallpaperaccess.com/full/16692.jpg",
    text:"Celestial dragon of immense divine power.",
    color:"orange"
  },
  shenron:{
    img:"https://wallpaperaccess.com/full/21017.jpg",
    text:"Wish granting dragon from Dragon Balls.",
    color:"green"
  }
};

function summonDragon(name){
  let d = dragons[name];
  document.getElementById("modal").style.display="flex";
  document.getElementById("dragonImg").src = d.img;
  document.getElementById("dragonText").innerText = d.text;
  document.getElementById("modalContent").style.borderColor = d.color;

  let audio = new Audio("https://www.myinstants.com/media/sounds/monster-roar.mp3");
  audio.play();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* SWIPE GOKU */
let startY=0;
document.addEventListener("touchstart", e=> startY = e.touches[0].clientY);

document.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;
  if(startY < endY - 100){
    let goku = document.getElementById("goku");
    goku.style.opacity=1;
    goku.style.top="100vh";

    setTimeout(()=>{
      goku.style.transition="none";
      goku.style.top="-200px";
      goku.style.opacity=0;
      goku.style.transition="1s";
    },1500);
  }
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="red";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y -= 1;
    if(p.y<0) p.y = canvas.height;
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
