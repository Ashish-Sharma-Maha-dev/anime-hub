<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌌 BODY */
body{
background:#000;
color:#fff;
overflow-x:hidden;
cursor:none;
}

/* ⭐ STARS */
#stars{
position:fixed;
top:0;left:0;
z-index:-2;
}

/* 🐉 DRAGON BG */
#bg-dragon{
position:fixed;
top:30%;
left:-300px;
width:250px;
opacity:0.15;
z-index:-1;
animation:dragonFly 20s linear infinite;
}
@keyframes dragonFly{
0%{left:-300px;top:30%}
50%{top:50%}
100%{left:110%;top:40%}
}

/* 🌈 CURSOR */
.cursor{
position:fixed;
width:20px;height:20px;
background:red;
border-radius:50%;
filter:blur(10px);
pointer-events:none;
z-index:9999;
}

/* ☰ MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
z-index:1000;
cursor:pointer;
}
.menu-btn div{
width:30px;height:3px;background:red;margin:6px 0;
}
.side-nav{
position:fixed;
left:-300px;
top:0;
width:300px;height:100%;
background:#000;
padding-top:60px;
transition:0.4s;
}
.side-nav a{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
border-bottom:1px solid #222;
}

/* HEADER */
header{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
header h1{
font-size:60px;
color:red;
text-shadow:0 0 30px red;
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:0.3s;
transform-style:preserve-3d;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px}
.card:hover{
box-shadow:0 0 30px red;
}

/* BUTTON */
button{
padding:10px;
background:red;
border:none;
color:#fff;
cursor:pointer;
margin-top:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
max-width:90%;
}
.modal img{
width:100%;
max-height:300px;
}

/* INPUT */
input{
padding:12px;
border:none;
border-radius:6px;
width:250px;
margin-top:10px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<img id="bg-dragon" src="https://pngimg.com/uploads/dragon/dragon_PNG84450.png">

<div class="cursor" id="cursor"></div>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="side-nav" id="menu">
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Shop</a>
<a href="#">Blogs</a>
<a href="#">Contact</a>
</div>

<header>
<h1>KINGU VAULT</h1>
<p>Ultimate Anime Experience</p>
</header>

<div class="section">

<h2>🔥 Trending Anime</h2>
<div class="grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div class="card-content">
<h3>Jujutsu Kaisen</h3>
<button onclick="openModal('jjk')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<div class="card-content">
<h3>Attack on Titan</h3>
<button onclick="openModal('aot')">Explore</button>
</div>
</div>

</div>

<h2>🛒 Shop</h2>
<div class="grid">

<div class="card">
<img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SL1500_.jpg">
<div class="card-content">
<h3>Naruto Hoodie</h3>
<button>Buy</button>
</div>
</div>

</div>

<h2>📖 Blogs</h2>
<div class="card">
<div class="card-content">
<h3>Top Anime 2026</h3>
<p>Coming soon...</p>
</div>
</div>

</div>

<!-- SUBSCRIBE -->
<div class="section" style="text-align:center;">
<h2>🚀 Join KINGU VAULT</h2>
<input type="email" placeholder="Enter your email"><br>
<button onclick="alert('Subscribed!')">Subscribe</button><br><br>
<button onclick="alert('Bug reported!')">Report Bug</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="img">
<p id="text"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.left = m.style.left==="0px"?"-300px":"0px";
}

/* MODAL */
const data={
jjk:{img:"https://cdn.myanimelist.net/images/anime/1141/142503.jpg",text:"Culling Game arc."},
aot:{img:"https://cdn.myanimelist.net/images/anime/1337/99013.jpg",text:"Final war."}
};

function openModal(name){
let d=data[name];
document.getElementById("modal").style.display="flex";
document.getElementById("img").src=d.img;
document.getElementById("text").innerText=d.text;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* 3D CARDS */
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
let rect=card.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;
let rx=-(y-rect.height/2)/10;
let ry=(x-rect.width/2)/10;
card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.05)`;
});
card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});

/* ⭐ STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

</script>

</body>
</html>
