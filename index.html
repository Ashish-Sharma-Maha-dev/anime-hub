<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT ULTIMATE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:#020202;
color:white;
overflow-x:hidden;
perspective:1200px;
}

/* BACKGROUND GLOW */
.bg-glow{
position:fixed;
width:600px;height:600px;
background:radial-gradient(circle,rgba(255,0,0,0.25),transparent);
top:30%;left:30%;
filter:blur(120px);
z-index:-1;
}

/* PARALLAX */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px 20px;
transform-style:preserve-3d;
}

/* HEADER */
h1{
font-size:60px;
text-shadow:0 0 40px red;
}

/* SLIDER */
.slider{
width:100%;
overflow:hidden;
margin-top:40px;
}
.track{
display:flex;
animation:scroll 30s linear infinite;
}
.track img{
width:280px;height:180px;
margin:10px;
border-radius:15px;
transition:0.4s;
}
.track img:hover{
transform:scale(1.1) rotateY(12deg);
box-shadow:0 0 25px red;
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
width:100%;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
transition:0.5s;
transform:rotateX(10deg);
border:1px solid rgba(255,0,0,0.3);
}
.card:hover{
transform:rotateX(0deg) scale(1.08);
box-shadow:0 0 50px red;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px;}

button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
margin-top:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
max-width:90%;
border-radius:15px;
border:2px solid red;
}
.modal img{
width:100%;
max-height:300px;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;left:20px;
z-index:1000;
cursor:pointer;
}
.menu-btn div{
width:30px;height:3px;background:red;margin:6px 0;
}

.side-menu{
position:fixed;
left:-300px;
top:0;
width:300px;
height:100%;
background:#000;
padding-top:60px;
transition:0.4s;
}
.side-menu a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="side-menu" id="menu">
<a href="#">Home</a>
<a href="#">Anime Shop</a>
<a href="#">Affiliate Links</a>
<a href="#">Contact</a>
<a href="mailto:your@email.com">Report Bug</a>
</div>

<!-- HEADER -->
<section class="section">
<h1>KINGU VAULT</h1>

<div class="slider">
<div class="track">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png">
<img src="https://images.alphacoders.com/132/1328144.jpeg">

<!-- duplicate -->
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png">
<img src="https://images.alphacoders.com/132/1328144.jpeg">
</div>
</div>

</section>

<!-- CONTENT -->
<section class="section">
<div class="grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div class="card-content">
<h2>Jujutsu Kaisen</h2>
<button onclick="openModal('jjk')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/006.png">
<div class="card-content">
<h2>Charizard</h2>
<button onclick="openModal('charizard')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://images.alphacoders.com/132/1329656.jpeg">
<div class="card-content">
<h2>Bahamut</h2>
<button onclick="openModal('bahamut')">Explore</button>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImg">
<p id="modalText"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.left=m.style.left==="0px"?"-300px":"0px";
}

/* DATA */
const data={
jjk:{
img:"https://cdn.myanimelist.net/images/anime/1141/142503.jpg",
text:"Culling Game arc with extreme battles.",
sound:"https://www.myinstants.com/media/sounds/jjk.mp3"
},
charizard:{
img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/006.png",
text:"Fire dragon Pokémon with mega evolution power.",
sound:"https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3"
},
bahamut:{
img:"https://images.alphacoders.com/132/1329656.jpeg",
text:"Celestial dragon of destruction.",
sound:"https://www.myinstants.com/media/sounds/monster-roar.mp3"
}
};

let audio;

function openModal(name){
let d=data[name];
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=d.img;
document.getElementById("modalText").innerText=d.text;

if(audio) audio.pause();
audio=new Audio(d.sound);
audio.play();
}

function closeModal(){
document.getElementById("modal").style.display="none";
if(audio) audio.pause();
}

</script>

</body>
</html>
