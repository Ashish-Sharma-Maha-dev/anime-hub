<style>
/****** Global Styles ******/
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #020202;
  color: #fff;
  overflow-x: hidden;
}

/****** Particles Canvas ******/
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/****** Header ******/
header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: radial-gradient(circle, rgba(255,0,0,0.2), #020202);
  text-align: center;
}

header h1 {
  font-size: 3.5rem;
  letter-spacing: 4px;
  text-shadow: 0 0 20px red;
}

header p {
  margin-top: 10px;
  opacity: 0.7;
}

/****** Menu ******/
.menu-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  z-index: 1000;
}

.menu-btn div {
  width: 30px;
  height: 3px;
  background: red;
  margin: 6px 0;
}

/****** Side Menu ******/
.side-menu {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  padding-top: 60px;
  transition: 0.4s;
  z-index: 999;
}

.side-menu a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,0,0,0.3);
}

.side-menu a:hover {
  background: red;
}

/****** Section & Cards ******/
.section {
  padding: 60px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 15px;
  overflow: hidden;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 30px red;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
  text-align: center;
}

.card h2 {
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  opacity: 0.7;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}
