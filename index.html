<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:#000;
color:#fff;
overflow-x:hidden;
cursor:none;
}

/* STARS */
#stars{position:fixed;top:0;left:0;z-index:-3}

/* HERO DOTS */
#wave-dots{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-2;opacity:.6}

/* DRAGON */
#bg-dragon{
position:fixed;
top:20%;
left:-400px;
width:300px;
opacity:.12;
z-index:-1;
animation:dragonFly 25s linear infinite;
}
@keyframes dragonFly{
0%{left:-400px;transform:scale(.8)}
50%{top:40%;transform:scale(1.1)}
100%{left:120%;transform:scale(.9)}
}

/* CURSOR */
.cursor{
position:fixed;
width:20px;height:20px;
border-radius:50%;
pointer-events:none;
z-index:9999;
filter:blur(8px);
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;left:20px;
z-index:1000;cursor:pointer;
}
.menu-btn div{width:30px;height:3px;background:red;margin:6px 0}

.side-nav{
position:fixed;
left:-300px;
top:0;width:300px;height:100%;
background:#000;
padding-top:60px;
transition:.4s;
}
.side-nav a{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
border-bottom:1px solid #222;
}

/* HEADER */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}
header h1{
font-size:60px;
letter-spacing:6px;
animation:fade 1.5s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:.3s;
transform-style:preserve-3d;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px}
.card:hover{box-shadow:0 0 30px red}

/* BUTTON */
button{
padding:10px;
background:red;
border:none;
color:#fff;
cursor:pointer;
margin-top:10px;
}

/* INPUT */
input{
padding:12px;border:none;border-radius:6px;width:250px;margin-top:10px;
}

/* SOCIAL */
.social a{
margin:10px;
color:red;
text-decoration:none;
font-size:18px;
}
.social a:hover{
color:#fff;
text-shadow:0 0 10px red;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<img id="bg-dragon" src="https://pngimg.com/uploads/dragon/dragon_PNG84450.png">
<div class="cursor" id="cursor"></div>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="side-nav" id="menu">
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Shop</a>
<a href="#">Blogs</a>
<a href="#">Contact</a>
</div>

<!-- HERO -->
<header>
<canvas id="wave-dots"></canvas>
<h1>KINGU VAULT</h1>
<p>Worldclass Anime Experience</p>
</header>

<div class="section">

<h2>🔥 Trending Anime</h2>
<div class="grid">
<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div class="card-content"><h3>Jujutsu Kaisen</h3></div>
</div>
<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<div class="card-content"><h3>Attack on Titan</h3></div>
</div>
</div>

<h2>⚡ Power Universe</h2>
<div class="grid">
<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
<div class="card-content"><h3>Demon Slayer</h3></div>
</div>
<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1764/106659.jpg">
<div class="card-content"><h3>Solo Leveling</h3></div>
</div>
</div>

<h2>🛒 Shop</h2>
<div class="grid">
<div class="card">
<img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SL1500_.jpg">
<div class="card-content"><h3>Naruto Hoodie</h3></div>
</div>
</div>

<h2>📖 Blogs</h2>
<div class="card">
<div class="card-content">
<h3>Top Anime 2026</h3>
<p>Coming soon...</p>
</div>
</div>

</div>

<!-- SUBSCRIBE -->
<div class="section" style="text-align:center;">
<h2>🚀 Join KINGU VAULT</h2>
<input type="email" placeholder="Enter email"><br>
<button>Subscribe</button><br><br>
<button>Report Bug</button>
</div>

<!-- SOCIAL -->
<div class="section social" style="text-align:center;">
<h2>🌐 Follow Us</h2>
<a href="#">Instagram</a>
<a href="#">Twitter</a>
<a href="#">Facebook</a>
</div>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.left=m.style.left==="0px"?"-300px":"0px";
}

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
cursor.style.background=`hsl(${e.clientX%360},100%,50%)`;
});

/* 3D CARDS */
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
let r=card.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;
let rx=-(y-r.height/2)/10;
let ry=(x-r.width/2)/10;
card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.05)`;
});
card.addEventListener("mouseleave",()=>card.style.transform="rotateX(0) rotateY(0)");
});

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5,a:Math.random(),s:Math.random()*0.02});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
stars.forEach(st=>{
st.a+=st.s;
if(st.a>1||st.a<0)st.s*=-1;
ctx.fillStyle=`rgba(255,255,255,${st.a})`;
ctx.beginPath();
ctx.arc(st.x,st.y,st.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

/* HERO DOTS */
const wc=document.getElementById("wave-dots");
const wctx=wc.getContext("2d");
wc.width=window.innerWidth;
wc.height=window.innerHeight;

let dots=[];
for(let i=0;i<200;i++){
dots.push({x:Math.random()*wc.width,y:Math.random()*wc.height,r:Math.random()*2});
}
let ang=0;
function drawWave(){
wctx.clearRect(0,0,wc.width,wc.height);
dots.forEach(d=>{
let off=Math.sin((d.x+ang)*0.01)*20;
wctx.beginPath();
wctx.arc(d.x,d.y+off,d.r,0,Math.PI*2);
wctx.fillStyle="rgba(255,255,255,0.6)";
wctx.fill();
});
ang+=2;
requestAnimationFrame(drawWave);
}
drawWave();

</script>

</body>
</html>
