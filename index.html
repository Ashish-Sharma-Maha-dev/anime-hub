<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;cursor:none;}

body{
background:linear-gradient(270deg,#020202,#0a0000,#140000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
overflow-x:hidden;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LOADER */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#loader h1{
color:red;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

/* CUSTOM CURSOR */
.cursor{
position:fixed;
width:15px;height:15px;
background:red;
border-radius:50%;
pointer-events:none;
z-index:999;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}
.hero h1{
font-size:55px;
text-shadow:0 0 25px red;
}

/* GLOW */
.hero::after{
content:"";
position:absolute;
width:300px;height:300px;
background:red;
filter:blur(150px);
opacity:0.3;
top:30%;
left:40%;
z-index:-1;
}

/* NAV BUTTON */
.nav button{
padding:12px 20px;
background:linear-gradient(45deg,#ff0000,#aa0000);
border:none;
color:white;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}
.nav button:hover{
transform:translateY(-5px);
box-shadow:0 0 25px red;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:15px;
overflow:hidden;
transition:0.4s;
}
.card:hover{
transform:scale(1.08) rotateX(6deg);
box-shadow:0 0 40px red;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
transition:0.4s;
}
.card:hover img{
transform:scale(1.1);
}

/* SECTION */
.section{
padding:60px 20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
max-width:90%;
}

/* RESPONSIVE */
@media(max-width:600px){
.hero h1{font-size:35px;}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>LOADING...</h1>
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- HERO -->
<section class="hero">
<h1>KINGU VAULT</h1>
<p>Ultimate Anime Experience</p>

<div class="nav">
<button>Anime</button>
<button>Pokémon</button>
<button>Dragons</button>
<button>Blogs</button>
</div>
</section>

<!-- SAMPLE SECTION -->
<section class="section">
<div class="grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div style="padding:15px">
<h3>Jujutsu Kaisen</h3>
</div>
</div>

<div class="card">
<img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/006.png">
<div style="padding:15px">
<h3>Charizard</h3>
</div>
</div>

</div>
</section>

<script>

/* LOADER */
window.onload=()=>{
document.getElementById("loader").style.display="none";
}

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>
