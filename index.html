<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT GOD MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{
background:#020202;
color:white;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(255,0,0,0.2),transparent);
top:20%;
left:20%;
filter:blur(120px);
z-index:-1;
}

/* HEADER */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
header h1{
font-size:55px;
text-shadow:0 0 40px red;
}

/* LEFT MENU */
.menu-btn{
position:fixed;
top:20px;
left:20px;
cursor:pointer;
z-index:1000;
}
.menu-btn div{
width:30px;height:3px;background:red;margin:6px 0;
}

/* SIDE PANEL */
.side-menu{
position:fixed;
left:-300px;
top:0;
width:300px;
height:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(10px);
transition:0.4s;
z-index:999;
padding-top:60px;
}
.side-menu a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,0,0,0.3);
}
.side-menu a:hover{background:red}

/* DRAGON */
#dragon{
position:fixed;
top:50%;
left:-200px;
width:200px;
z-index:998;
opacity:0;
filter:drop-shadow(0 0 20px red);
}

/* GRID */
.section{padding:60px 20px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
transition:0.4s;
border:1px solid rgba(255,0,0,0.3);
}
.card:hover{
transform:scale(1.05) rotateX(5deg);
box-shadow:0 0 40px red;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px;}
button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
margin-top:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
border-radius:15px;
max-width:90%;
border:2px solid red;
}
.modal img{
width:100%;
max-height:300px;
object-fit:cover;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="side-menu" id="menu">
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Dragons</a>
<a href="#">Pokémon</a>
</div>

<img id="dragon" src="https://pngimg.com/uploads/dragon/dragon_PNG84450.png">

<header>
<h1>KINGU VAULT</h1>
<p>Ultimate Anime Universe</p>
</header>

<div class="section">
<div class="grid">

<div class="card">
<img src="https://images6.alphacoders.com/606/606263.jpg">
<div class="card-content">
<h2>Naruto</h2>
<button onclick="openModal('naruto')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://images4.alphacoders.com/133/1338062.jpeg">
<div class="card-content">
<h2>Jujutsu Kaisen</h2>
<button onclick="openModal('jjk')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://images5.alphacoders.com/128/1289289.jpg">
<div class="card-content">
<h2>One Piece</h2>
<button onclick="openModal('onepiece')">Explore</button>
</div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImg">
<p id="modalText"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* MENU + DRAGON */
function toggleMenu(){
let m=document.getElementById("menu");
let d=document.getElementById("dragon");

if(m.style.left==="0px"){
m.style.left="-300px";
}else{
m.style.left="0px";

/* DRAGON FLY */
d.style.opacity=1;
d.style.left="100%";
setTimeout(()=>{
d.style.left="-200px";
d.style.opacity=0;
},1500);
}
}

/* DATA + SOUND */
const data={
naruto:{
img:"https://images6.alphacoders.com/606/606263.jpg",
text:"Naruto future explores Otsutsuki threats.",
sound:"https://www.myinstants.com/media/sounds/naruto-theme.mp3"
},
jjk:{
img:"https://images4.alphacoders.com/133/1338062.jpeg",
text:"Culling Game intense fights begin.",
sound:"https://www.myinstants.com/media/sounds/jjk.mp3"
},
onepiece:{
img:"https://images5.alphacoders.com/128/1289289.jpg",
text:"Final war incoming.",
sound:"https://www.myinstants.com/media/sounds/one-piece.mp3"
}
};

let audio;

function openModal(name){
let d=data[name];
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=d.img;
document.getElementById("modalText").innerText=d.text;

/* SOUND PLAY */
if(audio) audio.pause();
audio=new Audio(d.sound);
audio.play();
}

function closeModal(){
document.getElementById("modal").style.display="none";
if(audio) audio.pause();
}

</script>

</body>
</html>
