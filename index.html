<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGU VAULT | IMAGE FIX</title>
    <style>
        body { background-color: #020202; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        header { background: linear-gradient(180deg, #800000 0%, #000000 100%); padding: 60px 20px; text-align: center; border-bottom: 3px solid #ff0000; position: relative; }
        .glitch { font-size: 2.8rem; font-weight: 900; color: #ff0000; text-shadow: 0 0 20px #ff0000; letter-spacing: 5px; text-transform: uppercase; }
        
        /* GOKU BOX FIX */
        #goku-box { 
            position: absolute; top: 20%; left: -250px; width: 150px; 
            transition: 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            z-index: 100; display: flex; 
        }
        #goku-box img { width: 100%; filter: drop-shadow(0 0 10px #ff0000); }
        .slide-now { left: 120% !important; }

        .container { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
        .dragon-item { background: #0f0f0f; margin-bottom: 15px; padding: 20px; border-left: 5px solid #ff0000; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .dragon-item:hover { background: #1a1a1a; transform: scale(1.02); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: #080808; margin: 5% auto; padding: 25px; border: 2px solid #ff0000; width: 85%; max-width: 550px; border-radius: 15px; position: relative; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .close-btn { position: absolute; right: 20px; top: 10px; color: #fff; font-size: 40px; cursor: pointer; }
        #modal-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; margin: 15px 0; border: 1px solid #333; }
        #modal-title { text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="roar-sound" src="https://www.soundjay.com/nature/sounds/creature-roar-01.mp3"></audio>

    <header id="header-area">
        <div class="glitch">KINGU VAULT</div>
        <p style="color: #666; font-size: 0.7rem;">SWIPE RIGHT ON "KINGU VAULT" TO SEE GOKU</p>
        
        <div id="goku-box">
            <img src="https://upload.wikimedia.org/wikipedia/it/b/bc/Goku_Super_Sayan_3.png" alt="Goku">
        </div>
    </header>

    <div class="container">
        <div id="dragon-list">
            <div class="dragon-item" onclick="openDragon('TIAMAT')"><h4>1. TIAMAT</h4></div>
            <div class="dragon-item" onclick="openDragon('KINGU')"><h4>2. KINGU</h4></div>
            <div class="dragon-item" onclick="openDragon('TYPHON')"><h4>3. TYPHON</h4></div>
            <div class="dragon-item" onclick="openDragon('BAHAMUT')"><h4>4. BAHAMUT</h4></div>
            <div class="dragon-item" onclick="openDragon('SHENRON')"><h4>5. SHENRON</h4></div>
        </div>
    </div>

    <div id="dragonModal" class="modal">
        <div class="modal-content" id="modal-box">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Name</h2>
            <img id="modal-img" src="" alt="Dragon">
            <p id="modal-desc" style="text-align:left; line-height:1.6; color:#ccc;"></p>
        </div>
    </div>

    <script>
        const dragonData = {
            'TIAMAT': { color: '#00ccff', img: 'https://images.unsplash.com/photo-1509023467866-f76223258d99?w=500', desc: '<b>Origin:</b> Babylonian.<br>Goddess of the salt sea.' },
            'KINGU': { color: '#9133ff', img: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500', desc: '<b>Origin:</b> Babylonian.<br>Commander of the army of Tiamat.' },
            'TYPHON': { color: '#ff4500', img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500', desc: '<b>Origin:</b> Greek.<br>The deadliest creature in Greek mythology.' },
            'BAHAMUT': { color: '#e0e0e0', img: 'https://images.unsplash.com/photo-1605142859862-978be7eba909?w=500', desc: '<b>Origin:</b> Arabic.<br>The King of Dragons.' },
            'SHENRON': { color: '#00ff44', img: 'https://images.unsplash.com/photo-1578632292335-df3abbb0d586?w=500', desc: '<b>Origin:</b> Dragon Ball.<br>The Eternal wish-granting dragon.' }
        };

        function openDragon(name) {
            const data = dragonData[name];
            const roar = document.getElementById('roar-sound');
            roar.play().catch(e => {});

            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-title').style.color = data.color;
            document.getElementById('modal-img').src = data.img;
            document.getElementById('modal-desc').innerHTML = data.desc;
            
            const modalBox = document.getElementById('modal-box');
            modalBox.style.borderColor = data.color;
            modalBox.style.boxShadow = `0 0 40px ${data.color}`;
            document.getElementById('dragonModal').style.display = "block";
        }

        function closeModal() { document.getElementById('dragonModal').style.display = "none"; }
        window.onclick = function(e) { if (e.target == document.getElementById('dragonModal')) closeModal(); }

        // Goku Swipe
        const header = document.getElementById('header-area');
        const goku = document.getElementById('goku-box');
        let startX;
        header.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
        header.addEventListener('touchend', (e) => {
            let endX = e.changedTouches[0].clientX;
            if (endX > startX + 60) {
                goku.classList.add('slide-now');
                setTimeout(() => { 
                    goku.style.display = 'none'; 
                    goku.classList.remove('slide-now'); 
                    setTimeout(() => { goku.style.display = 'flex'; goku.style.left = '-250px'; }, 100); 
                }, 1500);
            }
        });

        // Background Particles
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = canvas.height; this.size = Math.random() * 2; this.speed = Math.random() * 1.5; }
            update() { this.y -= this.speed; if (this.y < 0) this.y = canvas.height; }
            draw() { ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
