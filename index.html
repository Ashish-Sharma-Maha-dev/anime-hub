<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGU VAULT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* BACKGROUND */
body{
background:linear-gradient(270deg,#020202,#0a0000,#140000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:#fff;
overflow-x:hidden;
cursor:none;
}
@keyframes bgMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* CURSOR */
.cursor{
position:fixed;
width:20px;height:20px;
background:red;
border-radius:50%;
filter:blur(10px);
pointer-events:none;
z-index:9999;
}

/* MENU */
.menu-btn{
position:fixed;
top:20px;right:20px;
z-index:1000;
cursor:pointer;
}
.menu-btn div{
width:30px;height:3px;background:red;margin:6px 0;
}
.side-nav{
position:fixed;
right:-300px;
top:0;
width:300px;height:100%;
background:#000;
padding-top:60px;
transition:0.4s;
}
.side-nav a{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
border-bottom:1px solid #222;
}

/* HEADER */
header{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
header h1{
font-size:60px;
color:red;
text-shadow:0 0 30px red;
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:0.3s;
transform-style:preserve-3d;
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px}

/* BUTTON */
button{
padding:10px;
background:red;
border:none;
color:#fff;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
max-width:90%;
}
.modal img{
width:100%;
max-height:300px;
}

/* GOKU */
#goku{
position:fixed;
top:-300px;
left:50%;
transform:translateX(-50%);
width:150px;
transition:1.5s;
}
.fly{
top:100vh !important;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div class="side-nav" id="menu">
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Shop</a>
<a href="#">Blogs</a>
<a href="#">Contact</a>
</div>

<!-- GOKU -->
<img id="goku" src="https://pngimg.com/uploads/goku/goku_PNG17.png">

<header>
<h1>KINGU VAULT</h1>
<p>Ultimate Anime Experience</p>
</header>

<div class="section">

<h2>🔥 Trending Anime</h2>
<div class="grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1141/142503.jpg">
<div class="card-content">
<h3>Jujutsu Kaisen</h3>
<button onclick="openModal('jjk')">Explore</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<div class="card-content">
<h3>Attack on Titan</h3>
<button onclick="openModal('aot')">Explore</button>
</div>
</div>

</div>

<h2>🛒 Shop</h2>
<div class="grid">

<div class="card">
<img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SL1500_.jpg">
<div class="card-content">
<h3>Naruto Hoodie</h3>
<button>Buy</button>
</div>
</div>

</div>

<h2>📖 Blogs</h2>
<div class="card">
<div class="card-content">
<h3>Top Anime 2026</h3>
<p>Coming soon...</p>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="img">
<p id="text"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.right = m.style.right==="0px"?"-300px":"0px";
}

/* MODAL DATA */
const data={
jjk:{img:"https://cdn.myanimelist.net/images/anime/1141/142503.jpg",text:"Culling Game arc."},
aot:{img:"https://cdn.myanimelist.net/images/anime/1337/99013.jpg",text:"Final war."}
};

function openModal(name){
let d=data[name];
document.getElementById("modal").style.display="flex";
document.getElementById("img").src=d.img;
document.getElementById("text").innerText=d.text;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* 3D CARDS */
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
let rect=card.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;
let rx=-(y-rect.height/2)/10;
let ry=(x-rect.width/2)/10;
card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.05)`;
});
card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});

/* GOKU SWIPE */
let startY=0;
document.addEventListener("touchstart",e=>startY=e.touches[0].clientY);
document.addEventListener("touchend",e=>{
let endY=e.changedTouches[0].clientY;
if(endY>startY+100){
let g=document.getElementById("goku");
g.classList.add("fly");
setTimeout(()=>g.classList.remove("fly"),1500);
}
});

</script>

</body>
</html>
