<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGU VAULT | THE SECRET ARCHIVE</title>
    <style>
        body { background-color: #020202; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* --- SIDE MENU STYLING --- */
        .menu-btn {
            position: fixed; top: 20px; right: 20px; z-index: 10001;
            cursor: pointer; background: rgba(255, 0, 0, 0.2); padding: 10px; border-radius: 5px;
            border: 1px solid #ff0000;
        }
        .menu-btn div { width: 25px; height: 3px; background-color: #ff0000; margin: 5px 0; transition: 0.4s; }

        .side-nav {
            height: 100%; width: 0; position: fixed; z-index: 10000;
            top: 0; right: 0; background-color: rgba(10, 0, 0, 0.95);
            overflow-x: hidden; transition: 0.5s; padding-top: 80px;
            backdrop-filter: blur(10px); border-left: 2px solid #ff0000;
        }
        .side-nav a {
            padding: 15px 30px; text-decoration: none; font-size: 1.5rem;
            color: #888; display: block; transition: 0.3s; text-transform: uppercase;
            font-weight: bold; letter-spacing: 2px;
        }
        .side-nav a:hover { color: #ff0000; padding-left: 45px; background: rgba(255, 0, 0, 0.1); }
        .side-nav .close-nav { position: absolute; top: 20px; left: 20px; font-size: 36px; color: #ff0000; cursor: pointer; }

        /* --- HEADER --- */
        header { 
            height: 80vh; background: radial-gradient(circle, #4d0000 0%, #000000 100%); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-bottom: 4px solid #ff0000; position: relative;
        }
        .glitch { font-size: 3rem; font-weight: 900; color: #ff0000; text-shadow: 0 0 20px #ff0000; text-transform: uppercase; letter-spacing: 5px; }

        /* GOKU SECRET SUMMON */
        #goku-box { 
            position: fixed; top: -600px; left: 50%; transform: translateX(-50%); 
            width: 220px; transition: 2s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 9999; pointer-events: none;
        }
        #goku-box img { width: 100%; filter: drop-shadow(0 0 30px #ffea00); }
        .fly-down { top: 120% !important; }

        .container { padding: 60px 20px; max-width: 900px; margin: 0 auto; }
        .section-title { color: #ff0000; font-size: 2rem; border-left: 5px solid #ff0000; padding-left: 15px; margin-bottom: 50px; text-transform: uppercase; }

        .dragon-card {
            background: rgba(10, 10, 10, 0.95); margin-bottom: 60px; padding: 40px; 
            border-radius: 20px; border: 1px solid #222; transition: 0.4s;
        }
        .dragon-card h3 { color: #ff3333; font-size: 2.2rem; margin: 0 0 20px 0; }
        .stat-bar { background: #1a1a1a; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; border: 1px solid #333; }
        .stat-fill { background: linear-gradient(90deg, #660000, #ff0000); height: 100%; box-shadow: 0 0 15px #ff0000; }

        .btn-summon {
            display: inline-block; background: #ff0000; color: white; padding: 15px 35px;
            text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; border: 2px solid #ff0000; width: 85%; max-width: 550px; border-radius: 20px; text-align: center; position: relative; }
        #modal-img { width: 100%; border-radius: 15px; margin: 20px 0; border: 1px solid #444; max-height: 350px; object-fit: cover; }

        footer { text-align: center; padding: 100px 20px; color: #333; border-top: 1px solid #111; letter-spacing: 5px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="roar-sound" src="https://www.soundjay.com/nature/sounds/creature-roar-01.mp3"></audio>

    <div class="menu-btn" onclick="toggleNav()">
        <div></div><div></div><div></div>
    </div>

    <div id="mySidenav" class="side-nav">
        <span class="close-nav" onclick="toggleNav()">&times;</span>
        <a href="#">Home</a>
        <a href="#">New Shop</a>
        <a href="#dragon-list">Dragon Wiki</a>
        <a href="#">Latest Blogs</a>
        <a href="#">Contact Dev</a>
    </div>

    <div id="goku-box"><img src="https://i.ibb.co/XbC0z9L/goku-fly.png" alt="Goku Fly"></div>

    <header>
        <div class="glitch">KINGU VAULT</div>
        <p style="color: #444; font-size: 0.8rem; margin-top: 20px; letter-spacing: 3px;">SECRET ARCHIVE UNLOCKED</p>
    </header>

    <div class="container" id="dragon-list">
        <h2 class="section-title">Ancient Primordials</h2>
        <div class="dragon-card">
            <h3>TIAMAT</h3>
            <div class="stat-bar"><div class="stat-fill" style="width: 95%;"></div></div>
            <div class="btn-summon" onclick="openDragon('TIAMAT')">Summon History</div>
        </div>
        <div class="dragon-card">
            <h3>KINGU</h3>
            <div class="stat-bar"><div class="stat-fill" style="width: 92%;"></div></div>
            <div class="btn-summon" onclick="openDragon('KINGU')">Summon History</div>
        </div>
        <div class="dragon-card">
            <h3>SHENRON</h3>
            <div class="stat-bar"><div class="stat-fill" style="width: 88%;"></div></div>
            <div class="btn-summon" onclick="openDragon('SHENRON')">Summon History</div>
        </div>
    </div>

    <div id="dragonModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:10px; font-size:40px; cursor:pointer;">&times;</span>
            <h2 id="modal-title"></h2>
            <img id="modal-img" src="">
            <p id="modal-desc" style="text-align:left; color:#ccc; line-height:1.7;"></p>
        </div>
    </div>

    <footer>&copy; 2026 KINGU VAULT | ASHU BHAI</footer>

    <script>
        // TOGGLE SIDE MENU
        function toggleNav() {
            const nav = document.getElementById("mySidenav");
            nav.style.width = nav.style.width === "280px" ? "0" : "280px";
        }

        const dragonData = {
            'TIAMAT': { color: '#00ccff', img: 'https://i.ibb.co/V9XwK54/tiamat.jpg', desc: 'The Mother of Chaos.' },
            'KINGU': { color: '#9133ff', img: 'https://i.ibb.co/wNb17sX/kingu.jpg', desc: 'The Great General.' },
            'SHENRON': { color: '#00ff44', img: 'https://i.ibb.co/YjRjYfX/shenron.jpg', desc: 'The Dragon God of Earth.' }
        };

        function openDragon(name) {
            const data = dragonData[name];
            document.getElementById('roar-sound').play().catch(e => {});
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-title').style.color = data.color;
            document.getElementById('modal-img').src = data.img;
            document.getElementById('modal-desc').innerHTML = data.desc;
            document.getElementById('dragonModal').style.display = "block";
        }

        function closeModal() { document.getElementById('dragonModal').style.display = "none"; }

        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', (e) => {
            let touchEndY = e.changedTouches[0].clientY;
            if (touchEndY > touchStartY + 150) { 
                const goku = document.getElementById('goku-box');
                goku.classList.add('fly-down');
                setTimeout(() => { goku.classList.remove('fly-down'); }, 2500);
            }
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = canvas.height; this.size = Math.random() * 2; this.speed = Math.random() * 1.5; }
            update() { this.y -= this.speed; if (this.y < 0) this.y = canvas.height; }
            draw() { ctx.fillStyle = 'rgba(255, 50, 0, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
