<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGU VAULT | 3D Official Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL SETUP --- */
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* --- MEGA BRAND HEADER (Sabse Upar) --- */
        .main-brand-header {
            background: linear-gradient(180deg, rgba(255,0,0,0.2) 0%, rgba(0,0,0,0) 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        .main-brand-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, #ff0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,0,0,0.5));
        }
        .main-brand-header p {
            color: #888;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* --- STICKY NAV --- */
        nav {
            background: rgba(10, 10, 10, 0.9);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid red;
        }
        .back-btn { color: white; text-decoration: none; border: 1.5px solid red; padding: 8px 20px; border-radius: 30px; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .back-btn:hover { background: red; box-shadow: 0 0 15px red; }

        /* --- 3D GRID & CARDS --- */
        .shop-container { padding: 60px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; max-width: 1400px; margin: 0 auto; perspective: 2000px; }

        .card { 
            background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid #1a1a1a; text-align: center;
            transform-style: preserve-3d; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card:hover { 
            border-color: red; 
            transform: translateY(-20px) rotateX(10deg) rotateY(10deg); 
            box-shadow: 0 30px 60px rgba(255,0,0,0.2); 
        }

        .img-container { 
            width: 100%; height: 300px; background: #fff; border-radius: 20px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; transform: translateZ(50px);
        }
        .card img { width: 85%; height: auto; object-fit: contain; }

        .card h3 { font-size: 1.5rem; font-weight: 800; margin: 15px 0; transform: translateZ(40px); }
        .price { color: red; font-size: 2rem; font-weight: 900; margin-bottom: 25px; transform: translateZ(60px); }

        .buy-btn { 
            width: 100%; background: red; color: white; border: none; padding: 18px; border-radius: 15px; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; 
            transform: translateZ(80px); transition: 0.4s;
        }
        .buy-btn:hover { background: white; color: red; transform: translateZ(110px) scale(1.05); box-shadow: 0 0 30px white; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .main-brand-header h1 { font-size: 2rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

<div class="main-brand-header">
    <h1>KINGU VAULT</h1>
    <p>Premium Anime & Gaming Gear</p>
</div>

<nav>
    <a href="index.html" class="back-btn">⬅ BACK TO HOME</a>
    <span style="font-weight: bold; color: #555; font-size: 0.8rem;">OFFICIAL STORE</span>
</nav>

<div class="shop-container">
    
    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/51rU6G+O7rL._AC_SX679_.jpg" alt="Sukuna Tee">
        </div>
        <h3>Sukuna "King" Tee</h3>
        <p class="price">₹599</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000?text=I want Sukuna Tee', '_blank')">🛒 ORDER NOW</button>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/61k8YV8Z-2L._AC_SL1500_.jpg" alt="Gojo Figure">
        </div>
        <h3>Gojo Satoru Figure</h3>
        <p class="price">₹1,299</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000?text=I want Gojo Figure', '_blank')">🛒 ORDER NOW</button>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/61-v8f8hXRL._AC_SX679_.jpg" alt="Black Bulls Hoodie">
        </div>
        <h3>Black Bulls Hoodie</h3>
        <p class="price">₹999</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000?text=I want Black Bulls Hoodie', '_blank')">🛒 ORDER NOW</button>
    </div>

</div>

</body>
</html>
