<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGU SHOP | Anime & Gaming Merch</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* HEADER STYLE */
        header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid red; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; background: red; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        
        /* SHOP GRID */
        .shop-container { padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        
        /* PRODUCT CARDS */
        .card { background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between;}
        .card:hover { border-color: red; transform: translateY(-5px); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        
        /* TEXT & BUTTONS */
        .card h3 { margin: 5px 0; font-size: 1.2rem; }
        .price { color: red; font-size: 1.5rem; font-weight: bold; margin: 10px 0 20px 0; }
        .buy-btn { width: 100%; background: white; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .buy-btn:hover { background: red; color: white; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅ Home</a>

</body>
</html>
