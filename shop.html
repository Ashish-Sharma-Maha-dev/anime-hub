<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGU VAULT | Beyond Reality</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* --- DYNAMIC NEON THEME --- */
        :root {
            --primary: #ff0040;
            --secondary: #7000ff;
            --bg: #050505;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Moving Mesh Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 64, 0.15) 0%, transparent 50%);
            z-index: -1; animation: meshMove 10s infinite alternate;
        }
        @keyframes meshMove { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* --- MEGA GLITCH HEADER --- */
        .main-brand-header {
            padding: 80px 20px; text-align: center; position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .main-brand-header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 6rem);
            margin: 0; text-transform: uppercase; letter-spacing: 10px;
            color: #fff; text-shadow: 3px 3px var(--primary), -3px -3px var(--secondary);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 3px 3px var(--primary), -3px -3px var(--secondary); }
            2% { text-shadow: 10px 0 var(--primary), -10px 0 var(--secondary); }
            4% { text-shadow: 3px 3px var(--primary), -3px -3px var(--secondary); }
            98% { text-shadow: 3px 3px var(--primary), -3px -3px var(--secondary); }
            100% { text-shadow: -5px 0 var(--primary), 5px 0 var(--secondary); }
        }

        /* --- CYBER NAV --- */
        nav { padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; }
        .back-btn { 
            color: white; text-decoration: none; border: 2px solid var(--primary); 
            padding: 10px 30px; border-radius: 0; font-weight: 900;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            background: rgba(255,0,64,0.1); transition: 0.4s;
        }
        .back-btn:hover { background: var(--primary); box-shadow: 0 0 30px var(--primary); transform: skewX(-5deg); }

        /* --- PREMIUM 3D GRID --- */
        .shop-container { 
            padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; max-width: 1400px; margin: 0 auto;
        }

        /* THE GLASS-CYBER CARD */
        .card { 
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px);
            padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; transition: 0.5s; overflow: hidden;
            border-left: 4px solid var(--primary);
        }
        
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary), var(--secondary), transparent);
            animation: rotateBorder 6s infinite linear; opacity: 0; transition: 0.5s; z-index: -1;
        }

        @keyframes rotateBorder { to { transform: rotate(360deg); } }

        .card:hover { transform: translateY(-10px) rotateY(5deg); border-color: var(--secondary); }
        .card:hover::before { opacity: 0.3; }

        /* PRODUCT IMAGE */
        .img-container { 
            width: 100%; height: 300px; background: #fff; border-radius: 5px; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .card img { width: 80%; height: auto; transition: 0.6s; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }
        .card:hover img { transform: scale(1.1) rotate(-5deg); }

        /* TEXT STYLING */
        .card h3 { font-size: 1.6rem; letter-spacing: 2px; color: #fff; margin: 15px 0; font-family: 'Orbitron'; }
        .price { 
            font-size: 2.2rem; font-weight: 900; margin-bottom: 25px; 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* NEON SLICE BUTTON */
        .buy-btn { 
            width: 100%; background: transparent; color: white; border: 2px solid var(--secondary); 
            padding: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; transition: 0.4s; position: relative;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 15% 100%);
        }
        .buy-btn:hover { 
            background: var(--secondary); box-shadow: 0 0 50px var(--secondary);
            color: white; transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="main-brand-header">
    <h1>KINGU VAULT</h1>
    <p style="letter-spacing: 8px;">NEXT GEN MERCHANDISE</p>
</div>

<nav>
    <a href="index.html" class="back-btn">RETURN_TO_BASE</a>
</nav>

<div class="shop-container">
    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/51rU6G+O7rL._AC_SX679_.jpg" alt="Sukuna Tee">
        </div>
        <h3>SUKUNA_TEE.EXE</h3>
        <p class="price">₹599</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000', '_blank')">INITIALIZE ORDER</button>
    </div>

    <div class="card" style="border-left-color: var(--secondary);">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/61k8YV8Z-2L._AC_SL1500_.jpg" alt="Gojo Figure">
        </div>
        <h3>GOJO_FIG.SYS</h3>
        <p class="price">₹1,299</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000', '_blank')">INITIALIZE ORDER</button>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/61-v8f8hXRL._AC_SX679_.jpg" alt="Black Bulls Hoodie">
        </div>
        <h3>BULLS_HOOD.WAV</h3>
        <p class="price">₹999</p>
        <button class="buy-btn" onclick="window.open('https://wa.me/910000000000', '_blank')">INITIALIZE ORDER</button>
    </div>
</div>

</body>
</html>
